name: 🎬 Mundial 2026 TV — Pipeline Único

# ─────────────────────────────────────────────────────────────────────────────
# ESTE ES EL ÚNICO WORKFLOW DEL REPO.
# Reemplaza a: mundial-ia-content.yml y mundial-shorts.yml (BÓRRALOS).
#
# Filosofía: calidad sobre cantidad. Genera solo contenido 100% único
# (nunca repite un partido ni un ranking ya publicado) gracias a
# content-history.json, que este workflow actualiza y commitea solo.
# ─────────────────────────────────────────────────────────────────────────────

on:
  # 1 vez al día es suficiente con contenido de calidad real
  schedule:
    - cron: '0 15 * * *'   # 11:00 Chile aprox

  workflow_dispatch:
    inputs:
      max_items:
        description: 'Máximo de videos a generar (calidad > cantidad)'
        required: false
        default: '3'
        type: choice
        options: ['1', '2', '3', '4']

permissions:
  contents: write  # necesario para commitear content-history.json de vuelta

env:
  NODE_VERSION: '20'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: GENERAR CONTENIDO ÚNICO (datos reales + anti-duplicados)
  # ════════════════════════════════════════════════════════════════════════════
  generate:
    name: 🤖 Generar contenido único
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      hay_contenido: ${{ steps.gen.outputs.hay_contenido }}
      fecha: ${{ steps.gen.outputs.fecha }}

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependencias
        run: npm ci

      - name: 🤖 Generar contenido (con chequeo anti-duplicados)
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          COMPETITION_ID: ${{ secrets.COMPETITION_ID }}
          MAX_ITEMS: ${{ inputs.max_items || '3' }}
        run: |
          node scripts/generate-daily-content.js
          FECHA=$(date +%Y-%m-%d)
          echo "fecha=$FECHA" >> $GITHUB_OUTPUT
          TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('daily-content.json')).total || 0)")
          echo "📊 Videos únicos generados: $TOTAL"
          if [ "$TOTAL" -gt 0 ]; then
            echo "hay_contenido=true" >> $GITHUB_OUTPUT
          else
            echo "hay_contenido=false" >> $GITHUB_OUTPUT
          fi

      - name: 💾 Commitear historial actualizado (anti-duplicados)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-history.json
          git diff --staged --quiet && echo "Sin cambios en historial" || git commit -m "chore: actualizar historial de contenido [skip ci]"
          git push || echo "Nada para pushear"

      - name: 💾 Guardar daily-content.json como artifact
        if: steps.gen.outputs.hay_contenido == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-content-${{ steps.gen.outputs.fecha }}
          path: daily-content.json
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: RENDER + UPLOAD (solo si hay contenido nuevo único)
  # ════════════════════════════════════════════════════════════════════════════
  render-upload:
    name: 🎬 Render y publicar
    runs-on: ubuntu-latest
    needs: generate
    if: needs.generate.outputs.hay_contenido == 'true'
    timeout-minutes: 45

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependencias
        run: npm ci

      - name: 🌐 Instalar Chrome para Remotion
        run: |
          npx remotion browser ensure
          echo "REMOTION_CHROME_FLAGS=--no-sandbox --disable-setuid-sandbox" >> $GITHUB_ENV

      - name: 📥 Descargar daily-content.json
        uses: actions/download-artifact@v4
        with:
          name: daily-content-${{ needs.generate.outputs.fecha }}

      - name: 🎬 Renderizar y subir todos los videos del día
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node scripts/render-and-upload.js

      - name: 💾 Backup de videos generados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videos-${{ needs.generate.outputs.fecha }}
          path: out/
          retention-days: 5

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: REPORTE
  # ════════════════════════════════════════════════════════════════════════════
  notify:
    name: 📊 Reporte final
    runs-on: ubuntu-latest
    needs: [generate, render-upload]
    if: always()
    steps:
      - name: 📊 Resumen
        run: |
          echo "═══════════════════════════════════════"
          echo "📺 MUNDIAL 2026 TV — Reporte del día"
          echo "═══════════════════════════════════════"
          if [ "${{ needs.generate.outputs.hay_contenido }}" == "false" ]; then
            echo "ℹ️ No había partidos/temas nuevos sin cubrir hoy."
            echo "   Esto es ESPERADO y BUENO — evita publicar duplicados."
          elif [ "${{ needs.render-upload.result }}" == "success" ]; then
            echo "✅ Pipeline completado — videos únicos publicados"
            echo "   Canal: https://www.youtube.com/@eliasvaldivia7233"
          else
            echo "⚠️ Hubo errores en render/upload — revisar logs del job"
          fi
          echo "═══════════════════════════════════════"
