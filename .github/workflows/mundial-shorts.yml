name: ⚽ Mundial 2026 — Auto Shorts

on:
  # ── Cron: cada 30 min durante el Mundial (jun-jul 2026) ─────────────────
  # Horarios de partidos: 12:00, 15:00, 18:00, 21:00 hora Chile (UTC-4)
  # = 16:00, 19:00, 22:00, 01:00 UTC → chequeamos 30min después
  schedule:
    - cron: "30 12 * 6-7 *"   # 12:30 UTC (08:30 Chile)
    - cron: "30 15 * 6-7 *"   # 15:30 UTC (11:30 Chile)
    - cron: "30 17 * 6-7 *"   # 17:30 UTC (13:30 Chile)
    - cron: "30 19 * 6-7 *"   # 19:30 UTC (15:30 Chile)
    - cron: "30 22 * 6-7 *"   # 22:30 UTC (18:30 Chile)
    - cron: "30 1  * 6-7 *"   # 01:30 UTC (21:30 Chile)
    - cron: "0  3  * 6-7 *"   # 03:00 UTC (23:00 Chile) — partidos nocturnos

  # ── Trigger manual desde GitHub UI ────────────────────────────────────
  workflow_dispatch:
    inputs:
      force_match:
        description: "JSON del partido manual (opcional)"
        required: false
        default: ""

env:
  NODE_VERSION: "20"

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: Verificar si hay partidos terminados
  # ══════════════════════════════════════════════════════════════════════════
  check-matches:
    name: 🔍 Verificar Partidos
    runs-on: ubuntu-latest

    outputs:
      matches_found: ${{ steps.check.outputs.matches_found }}
      match_count: ${{ steps.check.outputs.match_count }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── Modo manual: inyectar partido desde input ──────────────────────
      - name: 📋 Usar partido manual (si aplica)
        if: ${{ github.event.inputs.force_match != '' }}
        run: |
          echo '${{ github.event.inputs.force_match }}' > /tmp/matches_raw.json
          node -e "
            const m = JSON.parse(require('fs').readFileSync('/tmp/matches_raw.json','utf-8'));
            require('fs').writeFileSync('/tmp/matches.json', JSON.stringify([m]));
          "
          echo "matches_found=true" >> $GITHUB_OUTPUT
          echo "match_count=1" >> $GITHUB_OUTPUT
        id: manual

      # ── Modo automático: consultar API ─────────────────────────────────
      - name: 🌐 Consultar football-data.org
        if: ${{ github.event.inputs.force_match == '' }}
        id: check
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          COMPETITION_ID: ${{ secrets.COMPETITION_ID || 'WC' }}
        run: node scripts/check-finished-matches.js

      - name: 📤 Subir matches.json como artefacto
        if: ${{ steps.check.outputs.matches_found == 'true' || steps.manual.outputs.matches_found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: matches-data
          path: /tmp/matches.json
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: Renderizar los Shorts con Remotion
  # ══════════════════════════════════════════════════════════════════════════
  render:
    name: 🎬 Renderizar Shorts
    runs-on: ubuntu-latest
    needs: check-matches
    if: ${{ needs.check-matches.outputs.matches_found == 'true' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🌐 Instalar Chrome para Remotion
        run: npx remotion browser ensure

      - name: 📥 Descargar matches.json
        uses: actions/download-artifact@v4
        with:
          name: matches-data
          path: /tmp/

      - name: 🎬 Renderizar todos los partidos
        run: node scripts/render-batch.js
        env:
          MATCHES_FILE: /tmp/matches.json

      - name: 📤 Subir videos renderizados
        uses: actions/upload-artifact@v4
        with:
          name: rendered-shorts
          path: out/
          retention-days: 2

      - name: 📤 Subir rendered-files.json
        uses: actions/upload-artifact@v4
        with:
          name: render-manifest
          path: /tmp/rendered-files.json
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 3: Subir a YouTube Shorts
  # ══════════════════════════════════════════════════════════════════════════
  upload-youtube:
    name: 📺 Subir a YouTube
    runs-on: ubuntu-latest
    needs: render

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Descargar videos
        uses: actions/download-artifact@v4
        with:
          name: rendered-shorts
          path: out/

      - name: 📥 Descargar manifest
        uses: actions/download-artifact@v4
        with:
          name: render-manifest
          path: /tmp/

      - name: 📤 Subir a YouTube Shorts
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          # Ajustar rutas del manifest al directorio actual
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/rendered-files.json','utf-8'));
            const fixed = data.map(r => ({
              ...r,
              file: r.file.replace(/.*\/out\//, 'out/')
            }));
            fs.writeFileSync('/tmp/rendered-files.json', JSON.stringify(fixed));
          "
          node scripts/upload-batch.js

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 4: Notificación (opcional)
  # ══════════════════════════════════════════════════════════════════════════
  notify:
    name: 📢 Notificar
    runs-on: ubuntu-latest
    needs: upload-youtube
    if: always()

    steps:
      - name: ✅ Log resultado
        run: |
          echo "Pipeline MUNDIAL 2026 TV completado"
          echo "Fecha: $(date)"
          echo "Status jobs anteriores: check=${{ needs.check-matches.result }}, render=${{ needs.render.result }}"
